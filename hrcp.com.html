  <style>
    :root {
      --primary: #e53935;
      --primary-deep: #d32f2f;
      --primary-light: #ffcdd2;
      --gradient-start: #f8bbd0;
      --gradient-mid: #e91e63;
      --gradient-end: #9c27b0;
      --neutral-0: #ffffff;
      --neutral-900: #111111;
      --neutral-200: #eeeeee;
      --neutral-300: #dddddd;
      --neutral-700: #333333;
      --border-radius: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
      --shadow-md: 0 4px 8px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--neutral-0);
      color: var(--neutral-900);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Sticky nav */
    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(135deg, #ffffff, #f5f5f5);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
    }

    .sticky-nav__logo {
      font-weight: 700;
      font-size: 1.2rem;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .lang-switcher {
      font-size: 0.9rem;
      border: none;
      padding: 0.375rem 0.6rem;
      border-radius: 6px;
      background: var(--neutral-200);
      cursor: pointer;
    }

    /* Red urgency bar */
    .urgency-bar {
      background: linear-gradient(90deg, #ffebee 0%, #ffcdd2 40%, #f44336 100%);
      color: white;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.16);
    }

    /* Hero section */
    .hero {
      position: relative;
      padding: 5rem 1.5rem 4rem;
      text-align: center;
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
      color: white;
      overflow: hidden;
      scroll-behavior: smooth;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
    }

    .hero__inner {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 0 auto;
    }

    .hero__title {
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .hero__subtitle {
      font-size: 1.125rem;
      margin-bottom: 2rem;
      opacity: 0.95;
    }

    .hero__cta {
      display: inline-block;
      padding: 1rem 2rem;
      font-size: 1.125rem;
      font-weight: 700;
      border-radius: 60px;
      background: #ffffff;
      color: var(--primary);
      box-shadow: 0 4px 20px rgba(255,255,255,0.3);
      transform: translateY(0);
      transition: transform 0.3s var(--transition), box-shadow 0.3s var(--transition);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      animation: bounce 1.5s infinite alternate;
    }

    @keyframes bounce {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-6px);
      }
    }

    .hero__cta:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 8px 32px rgba(255,255,255,0.4);
    }

    /* Section spacing */
    .section {
      padding: 4rem 1.5rem;
    }

    .section--light {
      background: #fafafa;
    }

    .section__title {
      text-align: center;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--neutral-900);

    .section__subtitle {

      color: var(--neutral-700);
      max-width: 600px;

      max-width: 900px;
      margin: 0 auto;

    .feature-card {

      border-radius: var(--border-radius);
      padding: 1.25rem 1rem;
      text-align: center;
      box-shadow: var(--shadow-md);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .feature-card__icon {
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
      color: var(--primary);

    .feature-card__title {

      font-weight: 600;
      margin-bottom: 0.375rem;

    .feature-card__text {

      color: var(--neutral-700);

      gap: 1.25rem;
      max-width: 800px;
      margin: 0 auto;

    .stat-card {
      text-align: center;

    .stat-card__value {

      font-weight: 700;

      overflow-x: scroll;

      gap: 1rem;
      padding-bottom: 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .testimonial-card {

      padding: 1.25rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-sm);
